version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Job Hunter KE — Full Stack
#   • api        — Flask backend (port 5055)
#   • n8n        — automation engine (port 5678)
#   • postgres   — n8n database (internal only)
#
# Usage:
#   cp .env.example .env        # fill in your secrets
#   docker compose up -d
#   docker compose logs -f api  # watch logs
# ─────────────────────────────────────────────────────────────────────────────

x-restart: &restart
  restart: unless-stopped

services:

  # ─── JOB HUNTER API ───────────────────────────────────────────────────────
  api:
    <<: *restart
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jobhunter_api
    ports:
      - "${API_PORT:-5055}:5055"
    environment:
      # API security
      API_KEY: "${API_KEY}"
      N8N_WEBHOOK_SECRET: "${N8N_WEBHOOK_SECRET:-}"
      ALLOWED_ORIGIN: "${ALLOWED_ORIGIN:-*}"

      # AI provider (one of these must be set)
      GROQ_API_KEY: "${GROQ_API_KEY:-}"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:-}"
      TOGETHER_API_KEY: "${TOGETHER_API_KEY:-}"
      GROQ_MODEL: "${GROQ_MODEL:-llama-3.1-8b-instant}"

      # Email (SMTP or SendGrid)
      EMAIL_PROVIDER: "${EMAIL_PROVIDER:-smtp}"
      SMTP_HOST: "${SMTP_HOST:-smtp.gmail.com}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASS: "${SMTP_PASS:-}"
      SMTP_FROM: "${SMTP_FROM:-}"
      SENDGRID_API_KEY: "${SENDGRID_API_KEY:-}"
      SENDGRID_FROM: "${SENDGRID_FROM:-}"
      REVIEW_RECIPIENT_EMAIL: "${REVIEW_RECIPIENT_EMAIL:-}"

      # Misc
      DB_PATH: "/app/data/jobs.db"
      API_BASE_URL: "${API_BASE_URL:-http://localhost:5055}"
      REDDIT_CLIENT_ID: "${REDDIT_CLIENT_ID:-}"
      REDDIT_CLIENT_SECRET: "${REDDIT_CLIENT_SECRET:-}"
      REDDIT_USER_AGENT: "${REDDIT_USER_AGENT:-jobhunterke/1.0}"
      TZ: Africa/Nairobi

    volumes:
      - api_data:/app/data
      - ./my_profile.json:/app/my_profile.json:ro  # fallback profile

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5055/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    depends_on:
      postgres:
        condition: service_healthy

  # ─── N8N AUTOMATION ────────────────────────────────────────────────────────
  n8n:
    <<: *restart
    image: n8nio/n8n:latest
    container_name: jobhunter_n8n
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      N8N_PORT: 5678
      N8N_PROTOCOL: "${N8N_PROTOCOL:-http}"
      N8N_HOST: "${N8N_HOST:-localhost}"
      GENERIC_TIMEZONE: Africa/Nairobi
      TZ: Africa/Nairobi

      # Auth (recommended for production)
      N8N_BASIC_AUTH_ACTIVE: "${N8N_BASIC_AUTH_ACTIVE:-true}"
      N8N_BASIC_AUTH_USER: "${N8N_BASIC_AUTH_USER:-admin}"
      N8N_BASIC_AUTH_PASSWORD: "${N8N_BASIC_AUTH_PASSWORD:-changeme}"

      # Database (use postgres for reliability)
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: n8n
      DB_POSTGRESDB_PASSWORD: "${POSTGRES_PASSWORD:-n8npassword}"

      # Webhook URL (set this if behind a reverse proxy / ngrok)
      WEBHOOK_URL: "${N8N_WEBHOOK_URL:-}"

      # API key for calling Job Hunter API
      JH_API_KEY: "${API_KEY}"
      JH_API_URL: "http://api:5055"

    volumes:
      - n8n_data:/home/node/.n8n

    depends_on:
      postgres:
        condition: service_healthy

    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─── POSTGRES (for n8n) ───────────────────────────────────────────────────
  postgres:
    <<: *restart
    image: postgres:15-alpine
    container_name: jobhunter_postgres
    environment:
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-n8npassword}"
      POSTGRES_DB: n8n
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  api_data:
  n8n_data:
  postgres_data:
