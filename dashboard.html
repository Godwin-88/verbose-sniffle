<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Hunter KE — Review Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<style>
/* ── RESET & TOKENS ─────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0d0f14;
  --surface:   #13161d;
  --surface2:  #1a1e28;
  --border:    #222736;
  --border2:   #2d3347;
  --accent:    #00e5a0;
  --accent-d:  #00b87d;
  --blue:      #4f8ef7;
  --warn:      #f5a623;
  --danger:    #f05c5c;
  --purple:    #a78bfa;
  --text:      #dde3f0;
  --muted:     #5a6480;
  --muted2:    #7a85a0;
  --radius:    10px;
  --sidebar-w: 290px;
  --toolbar-h: 44px;
}

html, body { height: 100%; overflow: hidden; }
body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); font-size: 13.5px; }

/* ── LAYOUT ─────────────────────────────────────────────── */
.shell   { display: flex; height: 100vh; }
.sidebar { width: var(--sidebar-w); flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
.main    { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* ── SIDEBAR ─────────────────────────────────────────────── */
.logo { padding: 18px 20px 14px; border-bottom: 1px solid var(--border); }
.logo h1 { font-weight: 800; font-size: 17px; letter-spacing: -0.4px; }
.logo h1 span { color: var(--accent); }
.logo small { color: var(--muted); font-size: 11px; display: block; margin-top: 3px; }

.stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; padding: 12px; border-bottom: 1px solid var(--border); }
.stat { background: var(--bg); border-radius: 8px; padding: 8px 10px; text-align: center; }
.stat .n { font-size: 20px; font-weight: 800; }
.stat .l { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-top: 1px; }
.stat.green .n { color: var(--accent); }
.stat.blue  .n { color: var(--blue); }
.stat.warn  .n { color: var(--warn); }
.stat.purple .n { color: var(--purple); }

.filter-row { display: flex; flex-wrap: wrap; gap: 4px; padding: 10px 12px; border-bottom: 1px solid var(--border); }
.flt { font-size: 10px; font-weight: 700; letter-spacing: 0.6px; text-transform: uppercase; padding: 4px 8px; border-radius: 20px; border: 1px solid var(--border2); background: transparent; color: var(--muted); cursor: pointer; transition: all .15s; }
.flt:hover  { color: var(--text); border-color: var(--muted2); }
.flt.active { background: var(--accent); color: #000; border-color: var(--accent); }

.job-list { flex: 1; overflow-y: auto; padding: 6px 0; }
.job-list::-webkit-scrollbar { width: 4px; }
.job-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.ji {
  padding: 10px 16px;
  cursor: pointer;
  border-left: 3px solid transparent;
  transition: all .12s;
}
.ji:hover        { background: rgba(255,255,255,.03); }
.ji.active       { border-left-color: var(--accent); background: rgba(0,229,160,.05); }
.ji-title        { font-weight: 500; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ji-meta         { margin-top: 4px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.ji-co           { color: var(--muted2); font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 140px; }
.sector-badge    { font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 3px; letter-spacing: 0.5px; }
.sector-badge.government { background: rgba(245,166,35,.12); color: var(--warn); }
.sector-badge.ngo        { background: rgba(167,139,250,.12); color: var(--purple); }
.sector-badge.private    { background: rgba(79,142,247,.12); color: var(--blue); }
.sector-badge.social     { background: rgba(0,229,160,.10); color: var(--accent); }

.match-pill { font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 10px; background: rgba(0,229,160,.1); color: var(--accent); font-family: monospace; margin-left: auto; flex-shrink: 0; }
.mbar { height: 2px; background: var(--border); border-radius: 1px; margin-top: 5px; }
.mfill { height: 2px; border-radius: 1px; background: linear-gradient(90deg, var(--blue), var(--accent)); transition: width .4s ease; }

/* ── TOPBAR ──────────────────────────────────────────────── */
.topbar {
  height: var(--toolbar-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 12px;
  flex-shrink: 0;
}
.topbar h2 { font-weight: 700; font-size: 15px; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.topbar .meta { font-size: 11.5px; color: var(--muted); display: flex; align-items: center; gap: 10px; }
.topbar .meta a { color: var(--blue); text-decoration: none; }
.topbar .meta a:hover { text-decoration: underline; }

.btn { display: inline-flex; align-items: center; gap: 5px; padding: 6px 14px; border-radius: 7px; border: none; font-weight: 600; font-size: 12px; cursor: pointer; font-family: inherit; transition: all .15s; white-space: nowrap; }
.btn-approve { background: var(--accent); color: #000; }
.btn-approve:hover { background: var(--accent-d); }
.btn-reject  { background: transparent; color: var(--danger); border: 1px solid rgba(240,92,92,.35); }
.btn-reject:hover { background: rgba(240,92,92,.08); }
.btn-ghost   { background: transparent; color: var(--muted2); border: 1px solid var(--border2); }
.btn-ghost:hover { color: var(--text); border-color: var(--muted2); }
.btn-dl      { background: var(--surface2); color: var(--text); border: 1px solid var(--border2); }
.btn-dl:hover { border-color: var(--muted2); }
.btn-disabled { opacity: .4; pointer-events: none; }

/* ── TABS ────────────────────────────────────────────────── */
.tabs { display: flex; gap: 2px; background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 16px; flex-shrink: 0; }
.tab { padding: 9px 14px; font-size: 12px; font-weight: 600; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all .12s; user-select: none; }
.tab:hover  { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ── EDITOR PANE ─────────────────────────────────────────── */
.editor-shell { flex: 1; display: flex; overflow: hidden; }

.editor-toolbar {
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  padding: 6px 12px;
  display: flex;
  align-items: center;
  gap: 4px;
  flex-shrink: 0;
}
.ed-btn {
  width: 28px; height: 26px; display: flex; align-items: center; justify-content: center;
  border-radius: 5px; border: 1px solid transparent; background: transparent;
  color: var(--muted2); font-size: 12px; font-weight: 700; cursor: pointer; transition: all .12s;
  font-family: 'JetBrains Mono', monospace;
}
.ed-btn:hover { background: var(--border2); color: var(--text); border-color: var(--border2); }
.ed-sep { width: 1px; height: 18px; background: var(--border2); margin: 0 4px; }
.ed-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-left: auto; }

.pane { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.pane + .pane { border-left: 1px solid var(--border); }
.pane-header { padding: 6px 14px; background: var(--surface2); border-bottom: 1px solid var(--border); font-size: 10px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; color: var(--muted); display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.pane-header .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dot-edit    { background: var(--warn); }
.dot-preview { background: var(--accent); }

textarea.md-editor {
  flex: 1;
  background: var(--bg);
  color: var(--text);
  border: none;
  outline: none;
  resize: none;
  padding: 20px;
  font-family: 'JetBrains Mono', 'Fira Code', monospace;
  font-size: 13px;
  line-height: 1.75;
  overflow-y: auto;
  tab-size: 2;
}
textarea.md-editor::selection { background: rgba(0,229,160,.2); }
textarea.md-editor::-webkit-scrollbar { width: 5px; }
textarea.md-editor::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

.md-preview {
  flex: 1;
  overflow-y: auto;
  padding: 24px 28px;
  background: var(--bg);
  line-height: 1.75;
}
.md-preview::-webkit-scrollbar { width: 5px; }
.md-preview::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* ── MARKDOWN RENDER STYLES ──────────────────────────────── */
.md-preview h1 { font-size: 22px; font-weight: 800; margin: 0 0 6px; color: var(--text); letter-spacing: -.4px; }
.md-preview h2 { font-size: 16px; font-weight: 700; margin: 28px 0 10px; color: var(--text); border-bottom: 1px solid var(--border2); padding-bottom: 6px; }
.md-preview h3 { font-size: 13px; font-weight: 700; margin: 18px 0 8px; color: var(--muted2); text-transform: uppercase; letter-spacing: .8px; }
.md-preview p  { margin: 0 0 12px; color: var(--text); }
.md-preview ul, .md-preview ol { margin: 0 0 12px 20px; }
.md-preview li { margin: 4px 0; }
.md-preview li input[type=checkbox] { margin-right: 6px; accent-color: var(--accent); }
.md-preview strong { color: var(--text); font-weight: 700; }
.md-preview em { color: var(--muted2); }
.md-preview a { color: var(--blue); text-decoration: none; }
.md-preview a:hover { text-decoration: underline; }
.md-preview blockquote { border-left: 3px solid var(--accent); margin: 12px 0; padding: 8px 16px; background: rgba(0,229,160,.04); border-radius: 0 6px 6px 0; color: var(--muted2); }
.md-preview code { background: var(--surface2); padding: 1px 5px; border-radius: 4px; font-family: monospace; font-size: 12px; color: var(--accent); }
.md-preview pre { background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; padding: 14px; margin: 12px 0; overflow-x: auto; }
.md-preview pre code { background: none; padding: 0; color: var(--text); font-size: 12px; }
.md-preview hr { border: none; border-top: 1px solid var(--border2); margin: 20px 0; }
.md-preview table { border-collapse: collapse; width: 100%; margin: 12px 0; font-size: 13px; }
.md-preview th { background: var(--surface2); padding: 8px 12px; text-align: left; font-weight: 600; border: 1px solid var(--border2); }
.md-preview td { padding: 7px 12px; border: 1px solid var(--border2); }
.md-preview tr:nth-child(even) td { background: rgba(255,255,255,.02); }
.md-preview .comment-meta { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; margin-bottom: 20px; font-size: 11px; color: var(--muted); font-family: monospace; }

/* ── JOB DETAILS TAB ─────────────────────────────────────── */
.detail-pane { flex: 1; overflow-y: auto; padding: 24px; }
.detail-pane::-webkit-scrollbar { width: 5px; }
.kv-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
.kv-table td { padding: 9px 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
.kv-table td:first-child { color: var(--muted2); font-size: 12px; font-weight: 600; width: 130px; white-space: nowrap; }
.kv-table td a { color: var(--blue); text-decoration: none; word-break: break-all; }
.snippet-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 16px; font-size: 12.5px; line-height: 1.7; color: var(--muted2); white-space: pre-wrap; max-height: 300px; overflow-y: auto; }

/* ── RESUME INSIGHTS TAB ─────────────────────────────────── */
.insights-pane { flex: 1; overflow-y: auto; padding: 24px; }
.insights-pane::-webkit-scrollbar { width: 5px; }
.insight-section { margin-bottom: 24px; }
.insight-section h3 { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); margin-bottom: 10px; }
.summary-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 14px; line-height: 1.7; }
.pill-wrap { display: flex; flex-wrap: wrap; gap: 6px; }
.pill-skill { background: rgba(79,142,247,.1); color: var(--blue); border: 1px solid rgba(79,142,247,.2); padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; }
.pill-kw    { background: rgba(245,166,35,.08); color: var(--warn); border: 1px solid rgba(245,166,35,.2); padding: 3px 10px; border-radius: 20px; font-size: 11px; font-family: monospace; }
.rewrite-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-bottom: 8px; }
.rw-old { color: var(--muted); font-size: 12px; margin-bottom: 6px; text-decoration: line-through; }
.rw-new { color: var(--accent); font-size: 13px; }
.score-ring { display: inline-flex; align-items: center; gap: 8px; font-size: 28px; font-weight: 800; color: var(--accent); }
.score-ring small { font-size: 12px; color: var(--muted); font-weight: 400; }

/* ── EMPTY STATE ─────────────────────────────────────────── */
.empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 10px; color: var(--muted); text-align: center; padding: 40px; }
.empty .icon { font-size: 48px; }
.empty h3 { font-size: 18px; color: var(--text); }
.empty p  { font-size: 13px; line-height: 1.6; max-width: 340px; }
.empty code { background: var(--surface2); padding: 4px 10px; border-radius: 6px; font-size: 12px; color: var(--accent); }

/* ── TOAST ───────────────────────────────────────────────── */
.toast {
  position: fixed; bottom: 20px; right: 20px;
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 10px; padding: 12px 18px; font-size: 13px;
  box-shadow: 0 8px 30px rgba(0,0,0,.5);
  transform: translateY(60px); opacity: 0;
  transition: all .25s; z-index: 999;
}
.toast.show { transform: translateY(0); opacity: 1; }
.toast.ok  { border-color: rgba(0,229,160,.4); color: var(--accent); }
.toast.bad { border-color: rgba(240,92,92,.4); color: var(--danger); }
</style>
</head>
<body>

<div class="shell">

  <!-- ── SIDEBAR ──────────────────────────────────────────── -->
  <aside class="sidebar">
    <div class="logo">
      <h1>Job<span>Hunter</span> 🇰🇪</h1>
      <small id="model-label">Dashboard · localhost:5055</small>
    </div>

    <div class="stats-row">
      <div class="stat green"><div class="n" id="s-ready">–</div><div class="l">Review</div></div>
      <div class="stat blue"><div class="n" id="s-approved">–</div><div class="l">Approved</div></div>
      <div class="stat warn"><div class="n" id="s-pending">–</div><div class="l">Pending</div></div>
      <div class="stat purple"><div class="n" id="s-dispatched">–</div><div class="l">Sent</div></div>
    </div>

    <div class="filter-row">
      <button class="flt active" data-status="ready_for_review" onclick="setFilter(this)">Review</button>
      <button class="flt" data-status="approved"        onclick="setFilter(this)">Approved</button>
      <button class="flt" data-status="pending"         onclick="setFilter(this)">Pending</button>
      <button class="flt" data-status="dispatched"      onclick="setFilter(this)">Sent</button>
      <button class="flt" data-status="rejected"        onclick="setFilter(this)">Rejected</button>
    </div>

    <div class="job-list" id="job-list">
      <div class="empty" style="padding:40px 20px;">
        <div class="icon">⏳</div>
        <p>Loading jobs…</p>
      </div>
    </div>
  </aside>

  <!-- ── MAIN ─────────────────────────────────────────────── -->
  <div class="main" id="main">
    <div class="empty" style="height:100%">
      <div class="icon">📋</div>
      <h3>Select a job to review</h3>
      <p>Jobs ready for review appear sorted by AI match score.<br>
         The Flask API must be running:</p>
      <code>python api_server.py</code>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
/* ── CONFIG ───────────────────────────────────────────────── */
const API = 'http://localhost:5055';

/* ── STATE ────────────────────────────────────────────────── */
let jobs = [], currentJob = null, activeFilter = 'ready_for_review', activeTab = 'editor';

/* marked config */
marked.setOptions({
  gfm: true,
  breaks: true,
  highlight: (code, lang) => {
    if (lang && hljs.getLanguage(lang)) {
      return hljs.highlight(code, { language: lang }).value;
    }
    return hljs.highlightAuto(code).value;
  }
});

// Enable checkbox rendering
const renderer = new marked.Renderer();
renderer.listitem = (text) => {
  if (/^\[[ x]\]/.test(text)) {
    return `<li style="list-style:none;margin-left:-16px">
      <input type="checkbox" ${text.startsWith('[x]') ? 'checked' : ''} disabled>
      ${text.replace(/^\[[ x]\]\s*/, '')}
    </li>`;
  }
  return `<li>${text}</li>`;
};
marked.use({ renderer });

/* ── DATA ─────────────────────────────────────────────────── */
async function loadJobs(status = activeFilter) {
  try {
    const r = await fetch(`${API}/jobs?status=${status}`);
    jobs = await r.json();
    jobs.sort((a, b) => (b.match_score || 0) - (a.match_score || 0));
    renderList();
  } catch {
    document.getElementById('job-list').innerHTML = `
      <div class="empty" style="padding:30px 16px">
        <div class="icon">🔌</div>
        <p style="color:#f05c5c">Cannot reach API.<br>Run: <code>python api_server.py</code></p>
      </div>`;
  }
}

async function loadStats() {
  const statuses = ['ready_for_review', 'approved', 'pending', 'dispatched'];
  const ids = ['s-ready', 's-approved', 's-pending', 's-dispatched'];
  await Promise.all(statuses.map(async (s, i) => {
    try {
      const r = await fetch(`${API}/jobs?status=${s}`);
      const d = await r.json();
      document.getElementById(ids[i]).textContent = d.length;
    } catch { document.getElementById(ids[i]).textContent = '–'; }
  }));
}

/* ── SIDEBAR LIST ─────────────────────────────────────────── */
function renderList() {
  const el = document.getElementById('job-list');
  if (!jobs.length) {
    el.innerHTML = `<div class="empty" style="padding:40px 16px"><div class="icon">📭</div><p>No jobs in this category</p></div>`;
    return;
  }
  el.innerHTML = jobs.map(j => {
    const sector = j.sector || 'private';
    const score  = j.match_score;
    return `
    <div class="ji ${currentJob?.id === j.id ? 'active' : ''}" onclick="selectJob('${j.id}')">
      <div class="ji-title">${esc(j.title)}</div>
      <div class="ji-meta">
        <span class="ji-co">${esc(j.company || '—')}</span>
        <span class="sector-badge ${sector}">${sector === 'government' ? '🏛️ Gov' : sector.toUpperCase()}</span>
        ${score ? `<span class="match-pill">${score}%</span>` : ''}
      </div>
      ${score ? `<div class="mbar"><div class="mfill" style="width:${score}%"></div></div>` : ''}
    </div>`;
  }).join('');
}

/* ── SELECT JOB ───────────────────────────────────────────── */
async function selectJob(id) {
  try {
    const r = await fetch(`${API}/jobs/${id}`);
    currentJob = await r.json();
    activeTab = 'editor';
    renderMain();
    renderList();
  } catch (e) {
    toast('Failed to load job', 'bad');
  }
}

/* ── MAIN PANEL ───────────────────────────────────────────── */
function renderMain() {
  const j = currentJob;
  const isApproved = j.status === 'approved';

  document.getElementById('main').innerHTML = `
    <div class="topbar">
      <h2>${esc(j.title)} <span style="color:var(--muted);font-weight:400">@ ${esc(j.company)}</span></h2>
      <div class="meta">
        <span>${esc(j.location || 'Kenya')}</span>
        ${j.sector ? `<span class="sector-badge ${j.sector}" style="font-size:10px">${j.sector}</span>` : ''}
        ${j.match_score ? `<span class="match-pill">${j.match_score}%</span>` : ''}
        <a href="${j.url}" target="_blank">View posting ↗</a>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="btn btn-dl" onclick="downloadMD()">⬇ .md</button>
        ${!isApproved ? `<button class="btn btn-reject" onclick="rejectJob()">Reject</button>` : ''}
        ${!isApproved
          ? `<button class="btn btn-approve" onclick="approveJob()">✓ Approve</button>`
          : `<span style="color:var(--accent);font-weight:700;font-size:13px">✓ Approved</span>`}
      </div>
    </div>

    <div class="tabs">
      <div class="tab ${activeTab==='editor'?'active':''}"   onclick="switchTab('editor')">📝 Editor + Preview</div>
      <div class="tab ${activeTab==='resume'?'active':''}"   onclick="switchTab('resume')">📊 Resume Insights</div>
      <div class="tab ${activeTab==='details'?'active':''}"  onclick="switchTab('details')">ℹ️ Job Details</div>
    </div>

    <div id="tab-body" style="flex:1;display:flex;overflow:hidden;">
      ${renderTab(activeTab)}
    </div>
  `;

  if (activeTab === 'editor') attachEditorEvents();
}

function renderTab(tab) {
  const j  = currentJob;
  const tr = (typeof j.tailored_resume === 'string')
    ? (() => { try { return JSON.parse(j.tailored_resume); } catch { return {}; } })()
    : (j.tailored_resume || {});

  if (tab === 'editor') {
    const md = j.full_doc_md || j.cover_letter || '_No document generated yet._';
    return `
    <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;">
      <div class="editor-toolbar">
        <button class="ed-btn" title="Bold"    onclick="wrapSel('**','**')"><b>B</b></button>
        <button class="ed-btn" title="Italic"  onclick="wrapSel('_','_')"><i>I</i></button>
        <button class="ed-btn" title="Heading" onclick="wrapSel('## ','')">H</button>
        <button class="ed-btn" title="Bullet"  onclick="insertLine('- ')">•</button>
        <button class="ed-btn" title="Checkbox" onclick="insertLine('- [ ] ')">☐</button>
        <div class="ed-sep"></div>
        <button class="ed-btn" title="HR"      onclick="insertLine('\\n---\\n')">—</button>
        <button class="ed-btn" title="Quote"   onclick="wrapSel('> ','')">❝</button>
        <button class="ed-btn" title="Code"    onclick="wrapSel('`','`')">{ }</button>
        <div class="ed-sep"></div>
        <span class="ed-label" id="char-count">0 chars</span>
      </div>
      <div class="editor-shell">
        <div class="pane">
          <div class="pane-header"><span class="dot dot-edit"></span>Markdown Source</div>
          <textarea class="md-editor" id="md-input" spellcheck="true">${esc(md)}</textarea>
        </div>
        <div class="pane">
          <div class="pane-header"><span class="dot dot-preview"></span>Live Preview</div>
          <div class="md-preview" id="md-preview"></div>
        </div>
      </div>
    </div>`;
  }

  if (tab === 'resume') {
    const brs = tr.bullet_rewrites || {};
    return `
    <div class="insights-pane">
      <div class="insight-section" style="display:flex;align-items:center;gap:20px;margin-bottom:28px">
        <div class="score-ring">
          ${tr.match_score || '?'}<span style="font-size:18px">%</span>
          <small>AI match score</small>
        </div>
      </div>

      <div class="insight-section">
        <h3>Tailored Professional Summary</h3>
        <div class="summary-box">${tr.summary || '—'}</div>
      </div>

      <div class="insight-section">
        <h3>Key Skills to Highlight</h3>
        <div class="pill-wrap">
          ${(tr.highlighted_skills || []).map(s => `<span class="pill-skill">${esc(s)}</span>`).join('') || '—'}
        </div>
      </div>

      <div class="insight-section">
        <h3>ATS Keywords (from Job Description)</h3>
        <div class="pill-wrap">
          ${(tr.keywords || []).map(k => `<span class="pill-kw">${esc(k)}</span>`).join('') || '—'}
        </div>
      </div>

      <div class="insight-section">
        <h3>Bullet Rewrites</h3>
        ${Object.entries(brs).length
          ? Object.entries(brs).map(([o, n]) => `
            <div class="rewrite-card">
              <div class="rw-old">− ${esc(o)}</div>
              <div class="rw-new">+ ${esc(n)}</div>
            </div>`).join('')
          : '<span style="color:var(--muted)">No rewrites generated</span>'}
      </div>

      ${tr.markdown ? `
      <div class="insight-section">
        <h3>Full Markdown Section</h3>
        <div class="md-preview" style="border:1px solid var(--border);border-radius:8px;padding:16px;background:var(--surface2)">
          ${marked.parse(tr.markdown)}
        </div>
      </div>` : ''}
    </div>`;
  }

  if (tab === 'details') {
    return `
    <div class="detail-pane">
      <table class="kv-table">
        ${[
          ['Title',    j.title],
          ['Company',  j.company],
          ['Location', j.location],
          ['Source',   j.source],
          ['Sector',   j.sector],
          ['Keyword',  j.keyword],
          ['Deadline', j.deadline],
          ['Status',   j.status],
          ['Scraped',  (j.scraped_at||'').substring(0,16)],
          ['URL',      `<a href="${j.url}" target="_blank">${esc(j.url)}</a>`],
        ].map(([k,v]) => `<tr><td>${k}</td><td>${v || '—'}</td></tr>`).join('')}
      </table>

      <h3 style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:10px;">Job Description</h3>
      <div class="snippet-box">${esc(j.full_description || j.snippet || '—')}</div>
    </div>`;
  }
}

/* ── EDITOR EVENTS ────────────────────────────────────────── */
function attachEditorEvents() {
  const ta = document.getElementById('md-input');
  const pv = document.getElementById('md-preview');
  const cc = document.getElementById('char-count');
  if (!ta || !pv) return;

  const render = () => {
    pv.innerHTML = marked.parse(ta.value);
    cc.textContent = ta.value.length.toLocaleString() + ' chars';
    // Sync scroll roughly
    const ratio = ta.scrollTop / (ta.scrollHeight - ta.clientHeight || 1);
    pv.scrollTop = ratio * (pv.scrollHeight - pv.clientHeight);
  };

  ta.addEventListener('input', render);
  ta.addEventListener('scroll', render);
  ta.addEventListener('keydown', e => {
    if (e.key === 'Tab') {
      e.preventDefault();
      const s = ta.selectionStart, end = ta.selectionEnd;
      ta.value = ta.value.substring(0, s) + '  ' + ta.value.substring(end);
      ta.selectionStart = ta.selectionEnd = s + 2;
      render();
    }
  });

  render();
}

function wrapSel(before, after) {
  const ta = document.getElementById('md-input');
  if (!ta) return;
  const s = ta.selectionStart, e = ta.selectionEnd;
  const sel = ta.value.substring(s, e);
  ta.value = ta.value.substring(0, s) + before + sel + after + ta.value.substring(e);
  ta.selectionStart = s + before.length;
  ta.selectionEnd   = e + before.length;
  ta.dispatchEvent(new Event('input'));
  ta.focus();
}

function insertLine(prefix) {
  const ta = document.getElementById('md-input');
  if (!ta) return;
  const s = ta.selectionStart;
  const lineStart = ta.value.lastIndexOf('\n', s - 1) + 1;
  ta.value = ta.value.substring(0, lineStart) + prefix + ta.value.substring(lineStart);
  ta.selectionStart = ta.selectionEnd = lineStart + prefix.length;
  ta.dispatchEvent(new Event('input'));
  ta.focus();
}

/* ── ACTIONS ──────────────────────────────────────────────── */
async function approveJob() {
  const ta = document.getElementById('md-input');
  const edited = ta ? ta.value : currentJob.full_doc_md;
  try {
    await fetch(`${API}/jobs/${currentJob.id}/approve`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        cover_letter:    extractCoverLetter(edited),
        full_doc_md:     edited,
        tailored_resume: currentJob.tailored_resume,
      }),
    });
    toast('✅ Approved and queued', 'ok');
    currentJob.status = 'approved';
    loadJobs(); loadStats();
    currentJob = null;
    document.getElementById('main').innerHTML = `
      <div class="empty" style="height:100%">
        <div class="icon">✅</div><h3>Approved!</h3>
        <p>Select the next job from the sidebar.</p>
      </div>`;
  } catch { toast('API error', 'bad'); }
}

async function rejectJob() {
  try {
    await fetch(`${API}/jobs/${currentJob.id}/reject`, { method: 'POST' });
    toast('❌ Rejected', 'bad');
    loadJobs(); loadStats();
    currentJob = null;
    document.getElementById('main').innerHTML = `
      <div class="empty" style="height:100%">
        <div class="icon">⏭️</div><h3>Skipped</h3>
        <p>Select the next job from the sidebar.</p>
      </div>`;
  } catch { toast('API error', 'bad'); }
}

function downloadMD() {
  const ta = document.getElementById('md-input');
  const content = ta ? ta.value : (currentJob.full_doc_md || currentJob.cover_letter || '');
  const safe = (currentJob.company || 'job').replace(/[^a-z0-9]/gi, '_').toLowerCase();
  const fname = `${safe}__application.md`;
  const blob  = new Blob([content], { type: 'text/markdown' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = fname;
  a.click();
  toast(`⬇ Downloaded ${fname}`, 'ok');
}

function extractCoverLetter(fullDoc) {
  // Pull just the cover letter section from the assembled doc
  const m = fullDoc.match(/## Part 1 — Cover Letter\n+([\s\S]+?)\n+---/);
  return m ? m[1].trim() : fullDoc;
}

/* ── TABS & FILTERS ───────────────────────────────────────── */
function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('tab-body').innerHTML = renderTab(tab);
  if (tab === 'editor') attachEditorEvents();
}

function setFilter(btn) {
  activeFilter = btn.dataset.status;
  document.querySelectorAll('.flt').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadJobs(activeFilter);
}

/* ── TOAST ────────────────────────────────────────────────── */
function toast(msg, type = 'ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast ${type} show`;
  clearTimeout(toast._t);
  toast._t = setTimeout(() => el.classList.remove('show'), 3200);
}

/* ── UTILS ────────────────────────────────────────────────── */
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── INIT ─────────────────────────────────────────────────── */
loadJobs();
loadStats();
setInterval(loadStats, 30_000);
</script>
