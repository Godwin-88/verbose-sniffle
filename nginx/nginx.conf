worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=n8n:10m rate=60r/m;

    # ── HTTP → HTTPS redirect ──────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Let Certbot complete ACME challenges over HTTP
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── Flask API ──────────────────────────────────────────────────────────
    # Replace API_DOMAIN with your actual domain, e.g. api.jobhunterke.com
    server {
        listen 443 ssl;
        server_name API_DOMAIN;

        ssl_certificate     /etc/letsencrypt/live/API_DOMAIN/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/API_DOMAIN/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        client_max_body_size 10M;

        location / {
            limit_req zone=api burst=20 nodelay;

            proxy_pass         http://api:5055;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }
    }

    # ── n8n ───────────────────────────────────────────────────────────────
    # Replace N8N_DOMAIN with your actual domain, e.g. n8n.jobhunterke.com
    server {
        listen 443 ssl;
        server_name N8N_DOMAIN;

        ssl_certificate     /etc/letsencrypt/live/N8N_DOMAIN/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/N8N_DOMAIN/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        client_max_body_size 16M;

        location / {
            limit_req zone=n8n burst=30 nodelay;

            proxy_pass         http://n8n:5678;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;

            # WebSocket support (n8n editor uses WS)
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
        }
    }
}
